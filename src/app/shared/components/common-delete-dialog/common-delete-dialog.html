@if (isOpen()) {
<div class="dialog-overlay" (click)="onCancel()">
    <div class="dialog-content" role="dialog" aria-modal="true" (click)="$event.stopPropagation()">
        <div class="dialog-header">
            <div class="dialog-badge">!</div>
            <div>
                <h2 class="dialog-title">{{ title() }}</h2>
                <p class="dialog-description">{{ description() }}</p>
            </div>
        </div>

        <div class="dialog-footer">
            <button class="btn-cancel" type="button" (click)="onCancel()">Cancel</button>
            <button class="btn-delete" type="submit" (click)="onConfirm()" [disabled]="loading()">
                {{ loading() ? 'Deleting...' : 'Delete' }}
            </button>
        </div>

    </div>
</div>
}
